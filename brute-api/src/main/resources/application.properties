spring.application.name=brute-api

# Configuração do Banco de Dados (Apontando para o container 'db')
spring.datasource.url=jdbc:mysql://db:3306/brute_db?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=13687644
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.datasource.hikari.initialization-fail-timeout=6000
spring.datasource.hikari.connection-timeout=3000
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false

# Configuração de segurança
api.security.token.secret=${JWT_SECRET:alguemPrecisaMatarOJavaScriptAssimComoFoiFizeramComOFlash}