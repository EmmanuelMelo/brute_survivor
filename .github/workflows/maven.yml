name: Java CI with Maven

on:
  push:
    branches: ['**']
    paths:
      - 'brute-api/**'
  pull_request:
    branches: ['**']
    paths:
      - 'brute-api/**'

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest


    defaults:
      run:
        working-directory: ./brute-api

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Cache Maven local repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('brute-api/**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2-

      - name: Run Maven tests
        run: |
          chmod +x mvnw || true
          ./mvnw -B -DskipTests=false test

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: brute-api/target/surefire-reports