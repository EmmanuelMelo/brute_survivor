# Configuraçăo do banco em memória H2 exclusivo para testes
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Dialeto correto para o H2
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Cria as tabelas do zero toda vez que os testes rodarem
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# Propriedade de segurança necessária para o TokenService carregar no ambiente de testes
api.security.token.secret=chave_secreta_falsa_apenas_para_os_testes_passarem